<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <title>Analiza Lotu Drona</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}" />
</head>

<body>
  <div class="container">
    <div class="row align-items-center">

      <div class="col-md-6">
        <div class="header-title fade-up" style="animation-delay: 0.3s;">Zanurz się w dane swojego lotu!</div>
        <div class="header-subtitle fade-up" style="animation-delay: 0.6s;">
          Prześlij plik .csv z aplikacji DJI Fly, a nasz system szczegółowo przeanalizuje każdy aspekt Twojego lotu — od
          zmian wysokości, przez prędkość, aż po zużycie baterii i trasę na mapie. Wszystko to w czytelnych wykresach i
          łatwych do zrozumienia raportach.
        </div>
        <form action="/" method="post" enctype="multipart/form-data" class="fade-up" style="animation-delay: 0.9s;">
          <div class="form-row mb-2">
            <label for="file-upload" class="custom-upload">Wybierz plik</label>
            <input id="file-upload" type="file" name="file" accept=".csv" required />
            <button class="btn btn-primary" type="submit">Prześlij</button>
          </div>
          <div id="file-name"></div>
        </form>
      </div>


      <div class="col-md-6 text-center fade-up" style="animation-delay: 0s;">
        <img src="{{ url_for('static', filename='dron.png') }}" alt="Mini 4 Pro" />
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-upload');
    const fileNameDisplay = document.getElementById('file-name');
    const customUpload = document.querySelector('.custom-upload');

    customUpload.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      const fileName = fileInput.files[0]?.name || '';
      fileNameDisplay.textContent = fileName;
    });


    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.fade-up').forEach(el => {
        el.style.animationPlayState = 'running';
      });
    });
  </script>
</body>

</html>
